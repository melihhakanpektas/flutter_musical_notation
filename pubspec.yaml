name: flutter_musical_notation
description: "A new Flutter package project."
version: 0.4.0
publish_to: "none"
homepage:

environment:
  sdk: ^3.7.0
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_music_core:
    path: ../flutter_music_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # Nota dizgisi SMuFL (Standard Music Font Layout) fontu Bravura ile yapılır.
  # Bravura, konumlandırmayı fontun kendi metadata'sından (anchor noktaları,
  # engraving defaults) alır; deneysel görsel kalibrasyona gerek kalmaz ve
  # sonuç platformdan bağımsız tutarlıdır. Bravura SIL OFL 1.1 lisanslıdır
  # (fonts/OFL-Bravura.txt). Metadata: fonts/bravura_metadata.json.
  #
  # NotoMusic (standart Unicode müzik blokları, SMuFL değil) geriye dönük
  # uyumluluk için hâlâ paketleniyor (fonts/OFL-NotoMusic.txt).
  fonts:
    - family: Bravura
      fonts:
        - asset: fonts/Bravura.otf
    - family: NotoMusic
      fonts:
        - asset: fonts/NotoMusic-Regular.ttf

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
